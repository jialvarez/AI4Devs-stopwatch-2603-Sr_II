<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stopwatch & Countdown</title>
    <style>
      :root {
        --bg: #0d1117;
        --surface: #161b22;
        --border: #30363d;
        --text: #e6edf3;
        --muted: #8b949e;
        --accent: #58a6ff;
        --accent-dim: #388bfd66;
        --success: #3fb950;
        --danger: #f85149;
        --warning: #d29922;
        --display-bg: #010409;
        --font-digital: "JetBrains Mono", "SF Mono", "Fira Code", "Consolas",
          monospace;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        transition: background-color 0.15s ease;
      }

      body.countdown-finished {
        animation: flash-bg 0.5s ease-in-out infinite alternate;
      }

      @keyframes flash-bg {
        from {
          background-color: var(--bg);
        }
        to {
          background-color: #3d1f1f;
        }
      }

      .shell {
        width: 100%;
        max-width: 42rem;
        display: flex;
        flex-direction: column;
        align-items: stretch;
        gap: 1.75rem;
      }

      header {
        text-align: center;
      }

      header h1 {
        margin: 0 0 0.35rem;
        font-size: clamp(1.1rem, 2.5vw, 1.35rem);
        font-weight: 600;
        letter-spacing: 0.02em;
        color: var(--muted);
      }

      .mode-toggle {
        display: flex;
        gap: 0.5rem;
        justify-content: center;
        flex-wrap: wrap;
      }

      .mode-toggle button {
        flex: 1;
        min-width: 8rem;
        max-width: 14rem;
        padding: 0.65rem 1rem;
        border-radius: 0.5rem;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--muted);
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s, color 0.15s, border-color 0.15s;
      }

      .mode-toggle button[aria-pressed="true"] {
        background: var(--accent-dim);
        border-color: var(--accent);
        color: var(--text);
      }

      .mode-toggle button:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      main {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 1rem;
        padding: clamp(1.25rem, 4vw, 2rem);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.5rem;
      }

      .display-wrap {
        width: 100%;
        background: var(--display-bg);
        border-radius: 0.75rem;
        border: 1px solid var(--border);
        padding: clamp(1rem, 3vw, 1.75rem);
        text-align: center;
      }

      time.display {
        font-family: var(--font-digital);
        font-size: clamp(2rem, 8vw, 3.5rem);
        font-variant-numeric: tabular-nums;
        letter-spacing: 0.06em;
        color: var(--text);
        display: block;
        line-height: 1.15;
      }

      body.countdown-finished time.display {
        animation: flash-text 0.35s ease-in-out infinite alternate;
        color: var(--danger);
      }

      @keyframes flash-text {
        from {
          opacity: 1;
        }
        to {
          opacity: 0.45;
        }
      }

      .countdown-setup {
        width: 100%;
        display: none;
        flex-direction: column;
        gap: 0.75rem;
      }

      .countdown-setup.is-visible {
        display: flex;
      }

      .countdown-setup legend {
        font-size: 0.85rem;
        color: var(--muted);
        margin-bottom: 0.25rem;
      }

      .time-inputs {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 0.5rem;
        align-items: end;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 0.25rem;
      }

      .field label {
        font-size: 0.75rem;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      .field input {
        width: 100%;
        padding: 0.5rem 0.6rem;
        border-radius: 0.4rem;
        border: 1px solid var(--border);
        background: var(--display-bg);
        color: var(--text);
        font-family: var(--font-digital);
        font-size: 1rem;
      }

      .field input:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 1px;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 0.6rem;
        justify-content: center;
        width: 100%;
      }

      .controls button {
        min-width: 5.5rem;
        padding: 0.65rem 1.1rem;
        border-radius: 0.5rem;
        border: none;
        font-size: 0.9rem;
        font-weight: 600;
        cursor: pointer;
        transition: filter 0.15s, transform 0.08s;
      }

      .controls button:active {
        transform: scale(0.98);
      }

      .controls button:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .btn-start {
        background: var(--success);
        color: #0d1117;
      }

      .btn-start.is-pause {
        background: var(--warning);
        color: #0d1117;
      }

      .btn-stop {
        background: var(--danger);
        color: #fff;
      }

      .btn-clear {
        background: transparent;
        color: var(--text);
        border: 1px solid var(--border);
      }

      .controls button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
        transform: none;
      }

      .hint {
        font-size: 0.8rem;
        color: var(--muted);
        text-align: center;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header>
        <h1>Timer</h1>
        <div
          class="mode-toggle"
          role="group"
          aria-label="Timer mode"
        >
          <button
            type="button"
            id="mode-stopwatch"
            aria-pressed="true"
          >
            Stopwatch
          </button>
          <button
            type="button"
            id="mode-countdown"
            aria-pressed="false"
          >
            Countdown
          </button>
        </div>
      </header>

      <main>
        <div class="display-wrap">
          <time
            class="display"
            id="display"
            datetime="PT0S"
            aria-live="polite"
            >00:00:00:000</time>
        </div>

        <fieldset class="countdown-setup" id="countdown-setup">
          <legend>Set countdown (hours, minutes, seconds)</legend>
          <div class="time-inputs">
            <div class="field">
              <label for="input-h">Hours</label>
              <input
                type="number"
                id="input-h"
                min="0"
                max="99"
                value="0"
                inputmode="numeric"
              />
            </div>
            <div class="field">
              <label for="input-m">Minutes</label>
              <input
                type="number"
                id="input-m"
                min="0"
                max="59"
                value="5"
                inputmode="numeric"
              />
            </div>
            <div class="field">
              <label for="input-s">Seconds</label>
              <input
                type="number"
                id="input-s"
                min="0"
                max="59"
                value="0"
                inputmode="numeric"
              />
            </div>
          </div>
        </fieldset>

        <div class="controls">
          <button type="button" class="btn-start" id="btn-start">
            Start
          </button>
          <button type="button" class="btn-stop" id="btn-stop">Stop</button>
          <button type="button" class="btn-clear" id="btn-clear">
            Clear
          </button>
        </div>

        <p class="hint" id="hint-stopwatch">
          Stopwatch counts up with millisecond precision.
        </p>
        <p class="hint" id="hint-countdown" hidden>
          Countdown uses your values above. Clear resets to those inputs.
        </p>
      </main>
    </div>

    <script src="script.js" defer></script>
  </body>
</html>
